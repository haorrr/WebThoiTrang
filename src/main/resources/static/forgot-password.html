<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu — MAISON</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-page__visual">
    <div class="auth-page__visual-content">
      <h2>Khôi phục<br><span>Tài khoản</span></h2>
      <p>Nhập địa chỉ email bạn đã đăng ký. Chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>
    </div>
  </div>
  <div class="auth-page__form-area">
    <div class="auth-form-box">
      <a href="index.html" class="auth-logo">MAISON<span>.</span></a>
      <h2 class="auth-title">Quên mật khẩu?</h2>
      <p class="auth-subtitle">Nhập email để nhận hướng dẫn đặt lại mật khẩu</p>

      <div id="alertBox"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">
          Gửi email khôi phục
        </button>
      </form>

      <p class="auth-footer-text" style="margin-top:1.5rem"><a href="login.html">← Quay lại đăng nhập</a></p>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    setLoading(btn, true);
    try {
      const res = await api.auth.forgotPassword(document.getElementById('email').value.trim());
      if (res.success) {
        alertBox.innerHTML = `<div class="alert alert-success">Nếu email này đã đăng ký, bạn sẽ nhận được hướng dẫn đặt lại mật khẩu trong vài phút. Vui lòng kiểm tra hộp thư (kể cả spam).</div>`;
        document.getElementById('forgotForm').reset();
      }
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message || 'Không tìm thấy email này'}</div>`;
    }
    setLoading(btn, false);
  });
</script>
</body>
</html>
