<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang đăng nhập... — MAISON</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 1rem; background: var(--color-background); }
    .loading-spinner { width: 48px; height: 48px; border: 4px solid var(--color-border); border-top-color: var(--color-cta); border-radius: 50%; animation: spin 0.8s linear infinite; }
    p { color: var(--color-text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <a href="../index.html" style="font-family:var(--font-heading);font-size:1.5rem;font-weight:800;color:var(--color-primary);margin-bottom:1rem">MAISON<span style="color:var(--color-cta)">.</span></a>
  <div class="loading-spinner"></div>
  <p>Đang xử lý đăng nhập...</p>

<script src="../js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const accessToken = params.get('accessToken');
  const refreshToken = params.get('refreshToken');

  if (!accessToken) {
    document.querySelector('p').textContent = 'Đăng nhập thất bại. Đang chuyển hướng...';
    setTimeout(() => window.location.href = '../login.html', 2000);
  } else {
    Auth.clear();
    Auth.save(accessToken, refreshToken, null);
    // Fetch user info then redirect
    api.users.me().then(res => {
      if (res.success) Auth.save(null, null, res.data);
      const user = Auth.getUser();
      showToast && showToast('Đăng nhập thành công!');
      setTimeout(() => {
        const role = user.role;
        if (role === 'ROLE_ADMIN' || role === 'ADMIN') {
          window.location.href = '../admin/dashboard.html';
        } else {
          window.location.href = '../index.html';
        }
      }, 600);
    }).catch(() => {
      window.location.href = '../index.html';
    });
  }
</script>
</body>
</html>
