  <nav class="sidebar-nav">

    <div class="sidebar-section-title">Quản lý</div>
    <a href="products.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Sản phẩm</a>
    <a href="categories.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>Danh mục</a>
    <a href="orders.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Đơn hàng</a>

    <a href="reviews.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Đánh giá</a>
    <a href="coupons.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Mã giảm giá</a>

  <div class="sidebar-footer"><button class="btn btn-outline btn-sm" style="width:100%;color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2)" onclick="handleLogout()">Đăng xuất</button></div>
</aside>

<main class="admin-main">
  <div class="admin-topbar"><h1>Quản lý người dùng</h1><span id="userCount" style="font-size:0.85rem;color:var(--color-text-muted)"></span></div>
  <div class="admin-body">
    <div class="admin-card">
      <div class="filters-bar">
        <input type="text" class="form-input filters-bar--search" id="searchInput" placeholder="Tìm theo tên hoặc email..." oninput="debounceSearch()">
        <select class="form-select" id="roleFilter" onchange="loadUsers()">
          <option value="">Tất cả vai trò</option>
          <option value="ROLE_USER">Thành viên</option>
          <option value="ROLE_ADMIN">Admin</option>
        </select>
        <select class="form-select" id="statusFilter" onchange="loadUsers()">
          <option value="">Tất cả trạng thái</option>
          <option value="ACTIVE">Hoạt động</option>
          <option value="INACTIVE">Vô hiệu</option>
        </select>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>Người dùng</th><th>Email</th><th>Vai trò</th><th>Đăng nhập</th><th>Ngày tạo</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
      <div style="padding:1rem 1.5rem;display:flex;justify-content:center"><div class="pagination" id="pagination"></div></div>
    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script>
let currentPage = 0;
let searchTimeout;

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  document.getElementById('sidebarUserName').textContent = Auth.getUser()?.name || 'Admin';
  loadUsers();
});

function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage = 0; loadUsers(); }, 400); }

async function loadUsers() {
  const tbody = document.getElementById('usersTable');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem">Đang tải...</td></tr>`;
  const params = { page: currentPage, size: 15 };
  const kw = document.getElementById('searchInput').value.trim();
  const role = document.getElementById('roleFilter').value;
  const status = document.getElementById('statusFilter').value;
  if (kw) params.search = kw;
  if (role) params.role = role;
  if (status) params.status = status;

  try {
    const res = await api.users.list(params);
    if (res.success && res.data) {
      const { content = [], totalElements = 0, totalPages = 0 } = res.data;
      document.getElementById('userCount').textContent = `${totalElements} người dùng`;
      tbody.innerHTML = content.map(u => {
        const initials = u.name ? u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : 'U';
        return `<tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--color-gold-light);color:var(--color-cta);font-family:var(--font-heading);font-weight:700;font-size:0.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">${initials}</div>
              <div style="font-weight:600;font-size:0.875rem">${u.name}</div>
            </div>
          </td>
          <td style="font-size:0.82rem">${u.email}</td>
          <td>${u.role === 'ROLE_ADMIN' ? '<span class="badge badge-warning">Admin</span>' : '<span class="badge badge-secondary">Thành viên</span>'}</td>
          <td style="font-size:0.82rem">${u.provider}</td>
          <td style="font-size:0.8rem;color:var(--color-text-muted)">${formatDate(u.createdAt)}</td>
          <td>${getStatusBadge(u.status)}</td>
          <td>
            <div class="actions">
              <button class="btn btn-xs ${u.status === 'ACTIVE' ? 'btn-danger' : 'btn-success'}" onclick="toggleUserStatus(${u.id})">${u.status === 'ACTIVE' ? 'Vô hiệu' : 'Kích hoạt'}</button>
            </div>
          </td>
        </tr>`;
      }).join('') || '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Không tìm thấy người dùng</td></tr>';
      renderPagination(totalPages);
    }
  } catch { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#DC2626;padding:1rem">Lỗi tải dữ liệu</td></tr>`; }
}

async function toggleUserStatus(id) {
  try {
    await api.users.toggleStatus(id);
    showToast('Đã cập nhật trạng thái người dùng');
    loadUsers();
  } catch (err) { showToast(err.message || 'Không thể cập nhật', 'error'); }
}

function renderPagination(total) {
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>←</button>`;
  for (let i = 0; i < total; i++) {
    if (Math.abs(i-currentPage)<=2||i===0||i===total-1) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
    else if (Math.abs(i-currentPage)===3) html += `<span style="color:var(--color-text-muted)">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=total-1?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}
function goPage(p) { currentPage = p; loadUsers(); }
</script>
</body>
</html>
