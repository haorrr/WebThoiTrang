<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt lại mật khẩu — MAISON</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-page__visual">
    <div class="auth-page__visual-content">
      <h2>Mật khẩu<br><span>Mới</span></h2>
      <p>Chọn mật khẩu mạnh để bảo vệ tài khoản của bạn.</p>
    </div>
  </div>
  <div class="auth-page__form-area">
    <div class="auth-form-box">
      <a href="index.html" class="auth-logo">MAISON<span>.</span></a>
      <h2 class="auth-title">Đặt lại mật khẩu</h2>
      <p class="auth-subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>

      <div id="alertBox"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="newPassword">Mật khẩu mới</label>
          <div class="input-group">
            <input class="form-input" type="password" id="newPassword" placeholder="Tối thiểu 6 ký tự" required minlength="6">
            <button type="button" class="input-toggle" id="toggle1" aria-label="Hiện mật khẩu">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Xác nhận mật khẩu</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">
          Đặt lại mật khẩu
        </button>
      </form>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const alertBox = document.getElementById('alertBox');

  if (!token) {
    alertBox.innerHTML = `<div class="alert alert-error">Link không hợp lệ. <a href="forgot-password.html">Yêu cầu lại</a></div>`;
    document.getElementById('resetForm').style.display = 'none';
  } else {
    // Verify token validity
    api.auth.verifyResetToken(token).then(res => {
      if (!res.success) {
        alertBox.innerHTML = `<div class="alert alert-error">Link đã hết hạn. <a href="forgot-password.html">Yêu cầu lại</a></div>`;
        document.getElementById('resetForm').style.display = 'none';
      }
    }).catch(() => {
      alertBox.innerHTML = `<div class="alert alert-error">Link không hợp lệ. <a href="forgot-password.html">Yêu cầu lại</a></div>`;
      document.getElementById('resetForm').style.display = 'none';
    });
  }

  document.getElementById('toggle1').addEventListener('click', () => {
    const inp = document.getElementById('newPassword');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPw = document.getElementById('newPassword').value;
    const confirmPw = document.getElementById('confirmPassword').value;
    alertBox.innerHTML = '';

    if (newPw !== confirmPw) {
      alertBox.innerHTML = `<div class="alert alert-error">Mật khẩu xác nhận không khớp</div>`;
      return;
    }

    const btn = document.getElementById('submitBtn');
    setLoading(btn, true);
    try {
      const res = await api.auth.resetPassword(token, newPw);
      if (res.success) {
        alertBox.innerHTML = `<div class="alert alert-success">Đặt lại mật khẩu thành công! Đang chuyển đến đăng nhập...</div>`;
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">${err.message || 'Có lỗi xảy ra'}</div>`;
      setLoading(btn, false);
    }
  });
</script>
</body>
</html>
