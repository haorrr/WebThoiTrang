<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý sản phẩm — Admin MAISON</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../shared.css">
</head>
<body class="admin-page">

<!-- Sidebar (same structure) -->
<aside class="admin-sidebar">
  <div class="sidebar-logo">MAISON<span>.</span></div>
  <div class="sidebar-user"><div class="sidebar-user__name" id="sidebarUserName">Admin</div><div class="sidebar-user__role">Administrator</div></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-title">Tổng quan</div>
    <a href="dashboard.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <div class="sidebar-section-title">Quản lý</div>
    <a href="products.html" class="active"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Sản phẩm</a>
    <a href="categories.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Danh mục</a>
    <a href="orders.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Đơn hàng</a>
    <a href="users.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Người dùng</a>
    <a href="reviews.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Đánh giá</a>
    <a href="coupons.html"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Mã giảm giá</a>
  </nav>
  <div class="sidebar-footer"><button class="btn btn-outline btn-sm" style="width:100%;color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2)" onclick="handleLogout()">Đăng xuất</button></div>
</aside>

<main class="admin-main">
  <div class="admin-topbar">
    <h1>Quản lý sản phẩm</h1>
    <button class="btn btn-primary btn-sm" onclick="openProductModal()">+ Thêm sản phẩm</button>
  </div>
  <div class="admin-body">
    <!-- Filters -->
    <div class="admin-card">
      <div class="filters-bar">
        <input type="text" class="form-input filters-bar--search" id="searchInput" placeholder="Tìm kiếm..." oninput="debounceSearch()">
        <select class="form-select" id="categoryFilter" onchange="loadProducts()">
          <option value="">Tất cả danh mục</option>
        </select>
        <select class="form-select" id="statusFilter" onchange="loadProducts()">
          <option value="">Tất cả trạng thái</option>
          <option value="ACTIVE">Hiển thị</option>
          <option value="INACTIVE">Ẩn</option>
        </select>
        <div style="margin-left:auto;display:flex;gap:8px">
          <span id="totalProducts" style="font-size:0.8rem;color:var(--color-text-muted);align-self:center"></span>
        </div>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>Sản phẩm</th><th>Danh mục</th><th>Giá</th><th>Giá KM</th><th>Tồn kho</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
      <div style="padding:1rem 1.5rem;display:flex;justify-content:center">
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</main>

<!-- Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal modal--lg">
    <div class="modal__header">
      <h3 id="modalTitle">Thêm sản phẩm mới</h3>
      <button class="modal__close" onclick="closeProductModal()"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="modalAlertBox"></div>
    <form id="productForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tên sản phẩm *</label>
          <input class="form-input" id="pName" required placeholder="Tên sản phẩm">
        </div>
        <div class="form-group">
          <label class="form-label">Danh mục *</label>
          <select class="form-select" id="pCategory" required>
            <option value="">Chọn danh mục</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Giá gốc (VND) *</label>
          <input class="form-input" type="number" id="pPrice" required placeholder="500000" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Giá khuyến mãi (VND)</label>
          <input class="form-input" type="number" id="pSalePrice" placeholder="Để trống nếu không KM" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tồn kho *</label>
          <input class="form-input" type="number" id="pStock" required placeholder="100" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Trạng thái</label>
          <select class="form-select" id="pStatus">
            <option value="ACTIVE">Hiển thị</option>
            <option value="INACTIVE">Ẩn</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Mô tả</label>
        <textarea class="form-textarea" id="pDescription" placeholder="Mô tả sản phẩm..." rows="3"></textarea>
      </div>
      <input type="hidden" id="pId">
    </form>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeProductModal()">Hủy</button>
      <button class="btn btn-primary" id="saveProductBtn" onclick="saveProduct()">Lưu sản phẩm</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirmDelete">
  <div class="confirm-dialog">
    <div class="confirm-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></div>
    <h3>Xóa sản phẩm?</h3>
    <p>Hành động này không thể hoàn tác. Sản phẩm sẽ bị xóa vĩnh viễn.</p>
    <div class="confirm-actions">
      <button class="btn btn-outline btn-sm" onclick="closeConfirm()">Hủy</button>
      <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">Xóa</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
let currentPage = 0;
let searchTimeout;
let categories = [];

document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  document.getElementById('sidebarUserName').textContent = Auth.getUser()?.name || 'Admin';
  await loadCategories();
  loadProducts();
});

async function loadCategories() {
  try {
    const res = await api.categories.list();
    if (res.success && res.data) {
      categories = [];
      function flatten(items) { items.forEach(c => { categories.push(c); if (c.children) flatten(c.children); }); }
      flatten(res.data);
      const opts = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      document.getElementById('categoryFilter').innerHTML += opts;
      document.getElementById('pCategory').innerHTML += opts;
    }
  } catch {}
}

function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage = 0; loadProducts(); }, 400); }

async function loadProducts() {
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem"><div class="spinner-sm" style="border-top-color:var(--color-cta);border-color:rgba(0,0,0,0.1)"></div></td></tr>`;
  const params = { page: currentPage, size: 15, sortBy: 'createdAt', sortDir: 'desc' };
  const kw = document.getElementById('searchInput').value.trim();
  const cat = document.getElementById('categoryFilter').value;
  const status = document.getElementById('statusFilter').value;
  if (kw) params.keyword = kw;
  if (cat) params.categoryId = cat;
  if (status) params.status = status;

  try {
    const res = await api.products.list(params);
    if (res.success && res.data) {
      const { content = [], totalElements = 0, totalPages = 0 } = res.data;
      document.getElementById('totalProducts').textContent = `${totalElements} sản phẩm`;
      if (content.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Không tìm thấy sản phẩm</td></tr>`;
        return;
      }
      tbody.innerHTML = content.map(p => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <img src="${p.images?.find(i=>i.primary)?.imageUrl || p.images?.[0]?.imageUrl || 'https://via.placeholder.com/40x50'}" alt="${p.name}" style="width:40px;height:50px;object-fit:cover;border-radius:6px">
              <div>
                <div style="font-weight:600;font-size:0.875rem">${p.name}</div>
                <div style="font-size:0.75rem;color:var(--color-text-muted)">${p.slug}</div>
              </div>
            </div>
          </td>
          <td><span style="font-size:0.82rem">${p.category?.name || '—'}</span></td>
          <td>${formatVND(p.price)}</td>
          <td>${p.salePrice ? `<span style="color:#16A34A;font-weight:600">${formatVND(p.salePrice)}</span>` : '—'}</td>
          <td><span class="badge ${p.stock === 0 ? 'badge-danger' : p.stock <= 5 ? 'badge-warning' : 'badge-success'}">${p.stock}</span></td>
          <td>${getStatusBadge(p.status)}</td>
          <td>
            <div class="actions">
              <button class="btn btn-xs btn-outline" onclick="editProduct(${p.id})">Sửa</button>
              <button class="btn btn-xs btn-outline" onclick="toggleStatus(${p.id})">${p.status === 'ACTIVE' ? 'Ẩn' : 'Hiện'}</button>
              <button class="btn btn-xs btn-danger" onclick="confirmDeleteProduct(${p.id})">Xóa</button>
            </div>
          </td>
        </tr>
      `).join('');
      renderPagination(totalPages);
    }
  } catch { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:1rem;color:#DC2626">Lỗi tải dữ liệu</td></tr>`; }
}

function renderPagination(total) {
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>←</button>`;
  for (let i = 0; i < total; i++) {
    if (Math.abs(i-currentPage) <= 2 || i===0 || i===total-1) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
    else if (Math.abs(i-currentPage)===3) html += `<span style="padding:0 4px;color:var(--color-text-muted)">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=total-1?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function goPage(p) { currentPage = p; loadProducts(); }

function openProductModal(id = null) {
  document.getElementById('modalTitle').textContent = id ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới';
  document.getElementById('productForm').reset();
  document.getElementById('pId').value = id || '';
  document.getElementById('modalAlertBox').innerHTML = '';
  document.getElementById('productModal').classList.add('open');
}

async function editProduct(id) {
  openProductModal(id);
  try {
    const res = await api.products.get(id);
    if (res.success && res.data) {
      const p = res.data;
      document.getElementById('pName').value = p.name;
      document.getElementById('pPrice').value = p.price;
      document.getElementById('pSalePrice').value = p.salePrice || '';
      document.getElementById('pStock').value = p.stock;
      document.getElementById('pStatus').value = p.status;
      document.getElementById('pDescription').value = p.description || '';
      document.getElementById('pCategory').value = p.category?.id || '';
    }
  } catch {}
}

function closeProductModal() { document.getElementById('productModal').classList.remove('open'); }

async function saveProduct() {
  const id = document.getElementById('pId').value;
  const alertBox = document.getElementById('modalAlertBox');
  alertBox.innerHTML = '';
  const data = {
    name: document.getElementById('pName').value.trim(),
    categoryId: parseInt(document.getElementById('pCategory').value),
    price: parseFloat(document.getElementById('pPrice').value),
    salePrice: document.getElementById('pSalePrice').value ? parseFloat(document.getElementById('pSalePrice').value) : null,
    stock: parseInt(document.getElementById('pStock').value),
    status: document.getElementById('pStatus').value,
    description: document.getElementById('pDescription').value.trim(),
  };
  if (!data.name || !data.categoryId || !data.price) {
    alertBox.innerHTML = '<div class="alert alert-error">Vui lòng điền đầy đủ thông tin bắt buộc</div>';
    return;
  }
  const btn = document.getElementById('saveProductBtn');
  setLoading(btn, true);
  try {
    const res = id ? await api.products.update(id, data) : await api.products.create(data);
    if (res.success) {
      closeProductModal();
      showToast(id ? 'Đã cập nhật sản phẩm' : 'Đã thêm sản phẩm mới');
      loadProducts();
    }
  } catch (err) {
    alertBox.innerHTML = `<div class="alert alert-error">${err.message || 'Có lỗi xảy ra'}</div>`;
    setLoading(btn, false);
  }
}

async function toggleStatus(id) {
  try {
    await api.products.toggleStatus(id);
    showToast('Đã cập nhật trạng thái');
    loadProducts();
  } catch { showToast('Không thể cập nhật', 'error'); }
}

let deleteId = null;
function confirmDeleteProduct(id) { deleteId = id; document.getElementById('confirmDelete').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmDelete').classList.remove('open'); deleteId = null; }
document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
  if (!deleteId) return;
  try {
    await api.products.delete(deleteId);
    closeConfirm();
    showToast('Đã xóa sản phẩm');
    loadProducts();
  } catch (err) { showToast(err.message || 'Không thể xóa', 'error'); }
});
</script>
</body>
</html>
