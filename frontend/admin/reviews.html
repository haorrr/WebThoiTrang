<main class="admin-main">
  <div class="admin-topbar"><h1>Duyệt đánh giá</h1></div>
  <div class="admin-body">
    <div class="admin-card">
      <div class="filters-bar">
        <select class="form-select" id="statusFilter" onchange="loadReviews()">
          <option value="">Tất cả</option>
          <option value="PENDING">Chờ duyệt</option>
          <option value="APPROVED">Đã duyệt</option>
          <option value="REJECTED">Từ chối</option>
        </select>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>Người dùng</th><th>Sản phẩm</th><th>Sao</th><th>Nhận xét</th><th>Ngày</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
          <tbody id="reviewsTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  document.getElementById('sidebarUserName').textContent = Auth.getUser()?.name || 'Admin';
  loadReviews();
});

async function loadReviews() {
  const tbody = document.getElementById('reviewsTable');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem">Đang tải...</td></tr>`;
  const params = { page: 0, size: 50 };
  const status = document.getElementById('statusFilter').value;
  if (status) params.status = status;

  try {
    const res = await api.reviews.adminList(params);
    if (res.success && res.data) {
      const reviews = res.data.content || [];
      if (reviews.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Không có đánh giá nào</td></tr>`;
        return;
      }
      tbody.innerHTML = reviews.map(r => `
        <tr>
          <td style="font-size:0.875rem">${r.userName || r.userEmail || '—'}</td>
          <td style="font-size:0.82rem">${r.productName || `ID: ${r.productId}`}</td>
          <td><div class="stars-row">${renderStars(r.rating)}</div></td>
          <td style="font-size:0.82rem;max-width:240px">${r.comment || ''}</td>
          <td style="font-size:0.78rem;color:var(--color-text-muted)">${formatDate(r.createdAt)}</td>
          <td>${getStatusBadge(r.status || 'PENDING')}</td>
          <td>
            <div class="actions">
              ${r.status !== 'APPROVED' ? `<button class="btn btn-xs btn-success" onclick="moderate(${r.id}, 'APPROVED')">Duyệt</button>` : ''}
              ${r.status !== 'REJECTED' ? `<button class="btn btn-xs btn-danger" onclick="moderate(${r.id}, 'REJECTED')">Từ chối</button>` : ''}
            </div>
          </td>
        </tr>
      `).join('');
    }
  } catch { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#DC2626;padding:1rem">Lỗi tải dữ liệu</td></tr>`; }
}

async function moderate(id, status) {
  try {
    await api.reviews.adminModerate(id, status);
    showToast(status === 'APPROVED' ? 'Đã duyệt đánh giá' : 'Đã từ chối đánh giá');
    loadReviews();
  } catch (err) { showToast(err.message || 'Không thể cập nhật', 'error'); }
}
</script>
</body>
</html>
