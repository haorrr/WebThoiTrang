<main class="admin-main">
  <div class="admin-topbar"><h1>Quản lý đơn hàng</h1><span id="orderCount" style="font-size:0.85rem;color:var(--color-text-muted)"></span></div>
  <div class="admin-body">
    <div class="admin-card">
      <div class="filters-bar">
        <input type="text" class="form-input filters-bar--search" id="searchInput" placeholder="Tìm email khách hàng..." oninput="debounceSearch()">
        <select class="form-select" id="statusFilter" onchange="loadOrders()">
          <option value="">Tất cả trạng thái</option>
          <option value="PENDING">Chờ xác nhận</option>
          <option value="CONFIRMED">Đã xác nhận</option>
          <option value="SHIPPING">Đang giao</option>
          <option value="DELIVERED">Đã giao</option>
          <option value="CANCELLED">Đã hủy</option>
        </select>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>ID</th><th>Khách hàng</th><th>Tổng tiền</th><th>Thanh toán</th><th>Ngày đặt</th><th>Trạng thái</th><th>Cập nhật</th></tr></thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
      <div style="padding:1rem 1.5rem;display:flex;justify-content:center"><div class="pagination" id="pagination"></div></div>
    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script>
let currentPage = 0;
let searchTimeout;

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  document.getElementById('sidebarUserName').textContent = Auth.getUser()?.name || 'Admin';
  loadOrders();
});

function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage = 0; loadOrders(); }, 400); }

async function loadOrders() {
  const tbody = document.getElementById('ordersTable');
  tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem">Đang tải...</td></tr>`;
  const params = { page: currentPage, size: 15, sortBy: 'createdAt', sortDir: 'desc' };
  const kw = document.getElementById('searchInput').value.trim();
  const status = document.getElementById('statusFilter').value;
  if (kw) params.email = kw;
  if (status) params.status = status;

  try {
    const res = await api.orders.adminList(params);
    if (res.success && res.data) {
      const { content = [], totalElements = 0, totalPages = 0 } = res.data;
      document.getElementById('orderCount').textContent = `${totalElements} đơn hàng`;
      tbody.innerHTML = content.map(o => `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td><div style="font-weight:600;font-size:0.875rem">${o.userEmail}</div></td>
          <td style="font-weight:600;color:var(--color-cta)">${formatVND(o.finalAmount)}</td>
          <td style="font-size:0.82rem">${o.paymentMethod}</td>
          <td style="font-size:0.8rem;color:var(--color-text-muted)">${formatDate(o.createdAt)}</td>
          <td>${getStatusBadge(o.status)}</td>
          <td>
            <select class="form-select" style="padding:5px 8px;font-size:0.78rem" onchange="updateStatus(${o.id}, this.value)" ${o.status === 'CANCELLED' || o.status === 'DELIVERED' ? 'disabled' : ''}>
              <option value="PENDING" ${o.status==='PENDING'?'selected':''}>Chờ xác nhận</option>
              <option value="CONFIRMED" ${o.status==='CONFIRMED'?'selected':''}>Xác nhận</option>
              <option value="SHIPPING" ${o.status==='SHIPPING'?'selected':''}>Đang giao</option>
              <option value="DELIVERED" ${o.status==='DELIVERED'?'selected':''}>Đã giao</option>
              <option value="CANCELLED" ${o.status==='CANCELLED'?'selected':''}>Hủy</option>
            </select>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Không có đơn hàng</td></tr>';
      renderPagination(totalPages);
    }
  } catch { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#DC2626;padding:1rem">Lỗi tải dữ liệu</td></tr>`; }
}

async function updateStatus(id, status) {
  try {
    await api.orders.adminUpdateStatus(id, { status });
    showToast('Đã cập nhật trạng thái đơn hàng');
    loadOrders();
  } catch (err) { showToast(err.message || 'Không thể cập nhật', 'error'); }
}

function renderPagination(total) {
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>←</button>`;
  for (let i = 0; i < total; i++) {
    if (Math.abs(i-currentPage)<=2||i===0||i===total-1) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
    else if (Math.abs(i-currentPage)===3) html += `<span style="color:var(--color-text-muted)">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=total-1?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function goPage(p) { currentPage = p; loadOrders(); }
</script>
</body>
</html>
