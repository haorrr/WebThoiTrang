  <div class="sidebar-footer"><button class="btn btn-outline btn-sm" style="width:100%;color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2)" onclick="handleLogout()">Đăng xuất</button></div>

<!-- Main -->
<main class="admin-main">
  <div class="admin-topbar">
    <h1 class="admin-topbar__title">🔥 Flash Sale</h1>
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Tạo Flash Sale</button>
  </div>

  <div class="admin-content">
    <div id="salesList" class="table-wrap">
      <div class="skeleton" style="height:200px;border-radius:12px"></div>
    </div>
  </div>
</main>

<!-- Modal -->
<div id="modal" class="modal-overlay">
  <div class="modal" style="max-width:560px">
    <div class="modal__header">
      <h3 id="modalTitle">Tạo Flash Sale</h3>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Tên chương trình</label>
        <input type="text" id="fsName" class="form-input" placeholder="VD: Sale Cuối Tuần">
      </div>
      <div class="form-group">
        <label class="form-label">Giảm giá (%)</label>
        <input type="number" id="fsDiscount" class="form-input" min="1" max="100" placeholder="20">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Bắt đầu</label>
          <input type="datetime-local" id="fsStart" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Kết thúc</label>
          <input type="datetime-local" id="fsEnd" class="form-input">
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary btn-sm" id="saveBtn" onclick="save()">Lưu</button>
    </div>
  </div>
</div>

<!-- Product modal -->
<div id="productModal" class="modal-overlay">
  <div class="modal" style="max-width:720px">
    <div class="modal__header">
      <h3>Thêm sản phẩm vào Flash Sale</h3>
      <button class="modal__close" onclick="closeProductModal()">✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="pmFlashId">
      <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
        <select id="pmCategory" class="form-input" style="flex:1" onchange="loadProductsByCategory(this.value)">
          <option value="">— Chọn danh mục —</option>
        </select>
        <input type="text" id="pmSearch" class="form-input" style="flex:1" placeholder="Tìm theo tên..." oninput="filterPmProducts()">
      </div>
      <div id="pmGrid" style="max-height:420px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px"></div>
      <div id="pmEmpty" style="display:none;text-align:center;padding:2rem;color:var(--color-text-muted)">Chọn danh mục để xem sản phẩm</div>
    </div>
  </div>
</div>

<script src="../js/api.js?v=3"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  loadSales();
});

let pmAllProducts = [];
let pmAddedIds = new Set();

async function loadSales() {
  const res = await api.flashSales.adminList({ page: 0, size: 50 });
  const items = res.data?.content || [];
  const list = document.getElementById('salesList');
  if (!items.length) { list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--color-text-muted)">Chưa có flash sale nào</div>'; return; }

  list.innerHTML = `<table class="table">
    <thead><tr><th>Tên</th><th>Giảm giá</th><th>Bắt đầu</th><th>Kết thúc</th><th>Trạng thái</th><th>Sản phẩm</th><th></th></tr></thead>
    <tbody>${items.map(fs => `
      <tr>
        <td><strong>${fs.name}</strong></td>
        <td>${fs.discountPercent}%</td>
        <td>${new Date(fs.startsAt).toLocaleString('vi-VN')}</td>
        <td>${new Date(fs.endsAt).toLocaleString('vi-VN')}</td>
        <td>${getStatusBadge(fs.status)}</td>
        <td>${fs.products?.length || 0} SP</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-outline btn-xs" onclick="viewDetail(${fs.id})">Chi tiết</button>
          ${fs.status === 'SCHEDULED' ? `
            <button class="btn btn-outline btn-xs" onclick="editSale(${fs.id})">Sửa</button>
          ` : ''}
          <button class="btn btn-outline btn-xs" onclick="openProductModal(${fs.id})">+ SP</button>
          ${fs.status !== 'ENDED' && fs.status !== 'CANCELLED' ? `
            <button class="btn btn-danger btn-xs" onclick="deleteSale(${fs.id})">Hủy</button>
          ` : ''}
        </td>
      </tr>
      ${fs.products?.length ? `<tr><td colspan="7" style="padding:0">
        <div style="padding:8px 16px;background:var(--color-bg)">
          ${fs.products.map(p => `
            <span style="display:inline-flex;align-items:center;gap:6px;margin:3px 6px;padding:4px 10px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:20px;font-size:0.8rem">
              ${p.productName} — <strong>${formatVND(p.flashPrice)}</strong>
              <button onclick="removeProduct(${fs.id},${p.productId})" style="background:none;border:none;cursor:pointer;color:#DC2626;font-size:1rem;padding:0;line-height:1">×</button>
            </span>`).join('')}
        </div>
      </td></tr>` : ''}
    `).join('')}
    </tbody>
  </table>`;
}

function openModal(id) {
  document.getElementById('editId').value = '';
  document.getElementById('fsName').value = '';
  document.getElementById('fsDiscount').value = '';
  document.getElementById('fsStart').value = '';
  document.getElementById('fsEnd').value = '';
  document.getElementById('modalTitle').textContent = 'Tạo Flash Sale';
  document.getElementById('modal').classList.add('open');
}

async function editSale(id) {
  const res = await api.flashSales.getById(id);
  const fs = res.data;
  document.getElementById('editId').value = fs.id;
  document.getElementById('fsName').value = fs.name;
  document.getElementById('fsDiscount').value = fs.discountPercent;
  document.getElementById('fsStart').value = fs.startsAt.slice(0,16);
  document.getElementById('fsEnd').value = fs.endsAt.slice(0,16);
  document.getElementById('modalTitle').textContent = 'Sửa Flash Sale';
  document.getElementById('modal').classList.add('open');
}

async function save() {
  const id = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('fsName').value,
    discountPercent: parseFloat(document.getElementById('fsDiscount').value),
    startsAt: document.getElementById('fsStart').value + ':00',
    endsAt: document.getElementById('fsEnd').value + ':00',
  };
  const btn = document.getElementById('saveBtn');
  setLoading(btn, true);
  try {
    if (id) await api.flashSales.update(id, data);
    else await api.flashSales.create(data);
    showToast('Đã lưu!');
    closeModal();
    loadSales();
  } catch (e) { showToast(e.message || 'Lỗi', 'error'); }
  setLoading(btn, false);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function deleteSale(id) {
  if (!confirm('Hủy flash sale này?')) return;
  try { await api.flashSales.delete(id); showToast('Đã hủy'); loadSales(); }
  catch (e) { showToast(e.message, 'error'); }
}

async function openProductModal(fsId) {
  document.getElementById('pmFlashId').value = fsId;
  document.getElementById('pmSearch').value = '';
  document.getElementById('pmGrid').innerHTML = '';
  document.getElementById('pmEmpty').style.display = '';
  pmAllProducts = [];

  // Collect already-added product ids from the current flash sale row
  const fsRes = await api.flashSales.getById(fsId);
  pmAddedIds = new Set((fsRes.data?.products || []).map(p => p.productId));

  // Load categories
  const catSel = document.getElementById('pmCategory');
  catSel.innerHTML = '<option value="">— Chọn danh mục —</option>';
  const catRes = await api.categories.list();
  const cats = catRes.data || [];
  // Group children under parent labels; if parent has no children, add parent as plain option
  const parents = cats.filter(c => !c.parentId);
  const children = cats.filter(c => c.parentId);
  parents.forEach(p => {
    const kids = children.filter(c => c.parentId === p.id);
    if (kids.length) {
      const group = document.createElement('optgroup');
      group.label = p.name;
      kids.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        group.appendChild(opt);
      });
      catSel.appendChild(group);
    } else {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      catSel.appendChild(opt);
    }
  });

  document.getElementById('productModal').classList.add('open');
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
}

async function loadProductsByCategory(catId) {
  const grid = document.getElementById('pmGrid');
  const empty = document.getElementById('pmEmpty');
  if (!catId) { grid.innerHTML = ''; empty.style.display = ''; return; }
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:1rem;color:var(--color-text-muted)">Đang tải...</div>';
  empty.style.display = 'none';
  const res = await api.products.list({ categoryId: catId, size: 100, status: 'ACTIVE' });
  pmAllProducts = res.data?.content || [];
  renderPmGrid();
}

function filterPmProducts() {
  renderPmGrid();
}

function renderPmGrid() {
  const q = document.getElementById('pmSearch').value.trim().toLowerCase();
  const filtered = q ? pmAllProducts.filter(p => p.name.toLowerCase().includes(q)) : pmAllProducts;
  const grid = document.getElementById('pmGrid');
  const empty = document.getElementById('pmEmpty');
  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = '';
    empty.textContent = 'Không có sản phẩm nào';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(p => {
    const added = pmAddedIds.has(p.id);
    const img = p.primaryImageUrl || '../images/product-jacket.png';
    const price = p.salePrice || p.price;
    return `
    <div style="display:flex;flex-direction:column;border:1px solid var(--color-border);border-radius:10px;overflow:hidden;${added ? 'opacity:0.6' : ''}">
      <img src="${img}" alt="${p.name}" style="width:100%;height:130px;object-fit:cover">
      <div style="padding:10px;flex:1;display:flex;flex-direction:column;gap:6px">
        <div style="font-size:0.85rem;font-weight:600;line-height:1.3">${p.name}</div>
        <div style="font-size:0.8rem;color:var(--color-primary);font-weight:600">${formatVND(price)}</div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:auto">
          <input type="number" id="sl_${p.id}" placeholder="Giới hạn SL" min="1"
            style="flex:1;padding:4px 8px;font-size:0.75rem;border:1px solid var(--color-border);border-radius:6px;min-width:0"
            ${added ? 'disabled' : ''}>
          <button class="btn btn-${added ? 'outline' : 'primary'} btn-xs" onclick="addProductToSale(${p.id})" ${added ? 'disabled' : ''}>
            ${added ? '✓ Đã thêm' : '+ Thêm'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function addProductToSale(productId) {
  const fsId = document.getElementById('pmFlashId').value;
  const limitEl = document.getElementById('sl_' + productId);
  const stockLimit = limitEl?.value ? parseInt(limitEl.value) : null;
  try {
    await api.flashSales.addProduct(fsId, productId, stockLimit);
    showToast('Đã thêm sản phẩm');
    pmAddedIds.add(productId);
    renderPmGrid();
    loadSales();
  } catch (e) { showToast(e.message, 'error'); }
}

async function removeProduct(fsId, productId) {
  try { await api.flashSales.removeProduct(fsId, productId); loadSales(); }
  catch (e) { showToast(e.message, 'error'); }
}

function viewDetail(id) { window.open('../flash-sale.html?id=' + id, '_blank'); }

</script>
</body>
</html>
