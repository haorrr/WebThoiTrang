<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Sales — Admin MAISON</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo"><a href="../index.html">MAISON<span>.</span></a></div>
    <nav class="admin-sidebar__nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="products.html">Sản phẩm</a>
      <a href="categories.html">Danh mục</a>
      <a href="orders.html">Đơn hàng</a>
      <a href="flash-sales.html" class="active">Flash Sale</a>
      <a href="coupons.html">Coupon</a>
      <a href="users.html">Người dùng</a>
      <a href="reviews.html">Đánh giá</a>
      <a href="loyalty.html">Điểm thưởng</a>
      <a href="inventory.html">Tồn kho</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-topbar__title">🔥 Flash Sale</h1>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ Tạo Flash Sale</button>
    </div>

    <div class="admin-content">
      <div id="salesList" class="table-wrap">
        <div class="skeleton" style="height:200px;border-radius:12px"></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
  <div class="modal" style="max-width:560px">
    <div class="modal__header">
      <h3 id="modalTitle">Tạo Flash Sale</h3>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Tên chương trình</label>
        <input type="text" id="fsName" class="form-input" placeholder="VD: Sale Cuối Tuần">
      </div>
      <div class="form-group">
        <label class="form-label">Giảm giá (%)</label>
        <input type="number" id="fsDiscount" class="form-input" min="1" max="100" placeholder="20">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Bắt đầu</label>
          <input type="datetime-local" id="fsStart" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Kết thúc</label>
          <input type="datetime-local" id="fsEnd" class="form-input">
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary btn-sm" id="saveBtn" onclick="save()">Lưu</button>
    </div>
  </div>
</div>

<!-- Product modal -->
<div id="productModal" class="modal-overlay">
  <div class="modal" style="max-width:600px">
    <div class="modal__header">
      <h3>Thêm sản phẩm vào Flash Sale</h3>
      <button class="modal__close" onclick="document.getElementById('productModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="pmFlashId">
      <input type="text" id="pmSearch" class="form-input" placeholder="Tìm sản phẩm..." oninput="debounceProductSearch()" style="margin-bottom:12px">
      <div id="pmResults" style="max-height:300px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<script src="../js/api.js?v=3"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  loadSales();
});

let pmSearchTimer;

async function loadSales() {
  const res = await api.flashSales.adminList({ page: 0, size: 50 });
  const items = res.data?.content || [];
  const list = document.getElementById('salesList');
  if (!items.length) { list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--color-text-muted)">Chưa có flash sale nào</div>'; return; }

  list.innerHTML = `<table class="table">
    <thead><tr><th>Tên</th><th>Giảm giá</th><th>Bắt đầu</th><th>Kết thúc</th><th>Trạng thái</th><th>Sản phẩm</th><th></th></tr></thead>
    <tbody>${items.map(fs => `
      <tr>
        <td><strong>${fs.name}</strong></td>
        <td>${fs.discountPercent}%</td>
        <td>${new Date(fs.startsAt).toLocaleString('vi-VN')}</td>
        <td>${new Date(fs.endsAt).toLocaleString('vi-VN')}</td>
        <td>${getStatusBadge(fs.status)}</td>
        <td>${fs.products?.length || 0} SP</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-outline btn-xs" onclick="viewDetail(${fs.id})">Chi tiết</button>
          ${fs.status === 'SCHEDULED' ? `
            <button class="btn btn-outline btn-xs" onclick="editSale(${fs.id})">Sửa</button>
          ` : ''}
          <button class="btn btn-outline btn-xs" onclick="openProductModal(${fs.id})">+ SP</button>
          ${fs.status !== 'ENDED' && fs.status !== 'CANCELLED' ? `
            <button class="btn btn-danger btn-xs" onclick="deleteSale(${fs.id})">Hủy</button>
          ` : ''}
        </td>
      </tr>
      ${fs.products?.length ? `<tr><td colspan="7" style="padding:0">
        <div style="padding:8px 16px;background:var(--color-bg)">
          ${fs.products.map(p => `
            <span style="display:inline-flex;align-items:center;gap:6px;margin:3px 6px;padding:4px 10px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:20px;font-size:0.8rem">
              ${p.productName} — <strong>${formatVND(p.flashPrice)}</strong>
              <button onclick="removeProduct(${fs.id},${p.productId})" style="background:none;border:none;cursor:pointer;color:#DC2626;font-size:1rem;padding:0;line-height:1">×</button>
            </span>`).join('')}
        </div>
      </td></tr>` : ''}
    `).join('')}
    </tbody>
  </table>`;
}

function openModal(id) {
  document.getElementById('editId').value = '';
  document.getElementById('fsName').value = '';
  document.getElementById('fsDiscount').value = '';
  document.getElementById('fsStart').value = '';
  document.getElementById('fsEnd').value = '';
  document.getElementById('modalTitle').textContent = 'Tạo Flash Sale';
  document.getElementById('modal').classList.add('open');
}

async function editSale(id) {
  const res = await api.flashSales.getById(id);
  const fs = res.data;
  document.getElementById('editId').value = fs.id;
  document.getElementById('fsName').value = fs.name;
  document.getElementById('fsDiscount').value = fs.discountPercent;
  document.getElementById('fsStart').value = fs.startsAt.slice(0,16);
  document.getElementById('fsEnd').value = fs.endsAt.slice(0,16);
  document.getElementById('modalTitle').textContent = 'Sửa Flash Sale';
  document.getElementById('modal').classList.add('open');
}

async function save() {
  const id = document.getElementById('editId').value;
  const data = {
    name: document.getElementById('fsName').value,
    discountPercent: parseFloat(document.getElementById('fsDiscount').value),
    startsAt: document.getElementById('fsStart').value + ':00',
    endsAt: document.getElementById('fsEnd').value + ':00',
  };
  const btn = document.getElementById('saveBtn');
  setLoading(btn, true);
  try {
    if (id) await api.flashSales.update(id, data);
    else await api.flashSales.create(data);
    showToast('Đã lưu!');
    closeModal();
    loadSales();
  } catch (e) { showToast(e.message || 'Lỗi', 'error'); }
  setLoading(btn, false);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function deleteSale(id) {
  if (!confirm('Hủy flash sale này?')) return;
  try { await api.flashSales.delete(id); showToast('Đã hủy'); loadSales(); }
  catch (e) { showToast(e.message, 'error'); }
}

function openProductModal(fsId) {
  document.getElementById('pmFlashId').value = fsId;
  document.getElementById('pmSearch').value = '';
  document.getElementById('pmResults').innerHTML = '';
  document.getElementById('productModal').classList.add('open');
}

function debounceProductSearch() {
  clearTimeout(pmSearchTimer);
  pmSearchTimer = setTimeout(searchProducts, 400);
}

async function searchProducts() {
  const q = document.getElementById('pmSearch').value.trim();
  if (!q) return;
  const res = await api.products.list({ keyword: q, size: 10 });
  const products = res.data?.content || [];
  document.getElementById('pmResults').innerHTML = products.map(p => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--color-border)">
      <img src="${p.primaryImageUrl || '../images/product-jacket.png'}" style="width:40px;height:40px;object-fit:cover;border-radius:6px">
      <div style="flex:1"><strong>${p.name}</strong><br><small>${formatVND(p.price)}</small></div>
      <input type="number" id="sl_${p.id}" placeholder="Giới hạn" style="width:80px;padding:4px 8px;font-size:0.8rem;border:1px solid var(--color-border);border-radius:6px">
      <button class="btn btn-primary btn-xs" onclick="addProductToSale(${p.id})">Thêm</button>
    </div>`).join('');
}

async function addProductToSale(productId) {
  const fsId = document.getElementById('pmFlashId').value;
  const limitEl = document.getElementById('sl_' + productId);
  const stockLimit = limitEl?.value ? parseInt(limitEl.value) : null;
  try {
    await api.flashSales.addProduct(fsId, productId, stockLimit);
    showToast('Đã thêm sản phẩm');
    document.getElementById('productModal').classList.remove('open');
    loadSales();
  } catch (e) { showToast(e.message, 'error'); }
}

async function removeProduct(fsId, productId) {
  try { await api.flashSales.removeProduct(fsId, productId); loadSales(); }
  catch (e) { showToast(e.message, 'error'); }
}

function viewDetail(id) { window.open('../flash-sale.html?id=' + id, '_blank'); }

</script>
</body>
</html>
