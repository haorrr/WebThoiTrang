<main class="admin-main">
  <div class="admin-topbar">
    <h1>Danh mục sản phẩm</h1>
    <button class="btn btn-primary btn-sm" onclick="openCatModal()">+ Thêm danh mục</button>
  </div>
  <div class="admin-body">
    <div class="admin-card">
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>Tên danh mục</th><th>Slug</th><th>Danh mục cha</th><th>Sản phẩm</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
          <tbody id="catsTable"><tr><td colspan="6" style="text-align:center;padding:2rem">Đang tải...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="catModal">
  <div class="modal">
    <div class="modal__header">
      <h3 id="catModalTitle">Thêm danh mục</h3>
      <button class="modal__close" onclick="closeModal()"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="catModalAlert"></div>
    <form id="catForm">
      <div class="form-group"><label class="form-label">Tên danh mục *</label><input class="form-input" id="catName" required placeholder="Áo khoác"></div>
      <div class="form-group"><label class="form-label">Slug (URL)</label><input class="form-input" id="catSlug" placeholder="ao-khoac"></div>
      <div class="form-group">
        <label class="form-label">Danh mục cha</label>
        <select class="form-select" id="catParent"><option value="">Không có (danh mục gốc)</option></select>
      </div>
      <div class="form-group"><label class="form-label">Mô tả</label><textarea class="form-textarea" id="catDesc" rows="2" placeholder="Mô tả danh mục..."></textarea></div>
      <input type="hidden" id="catId">
    </form>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" id="saveCatBtn" onclick="saveCat()">Lưu</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
let allCats = [];

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) { window.location.href = '../login.html'; return; }
  document.getElementById('sidebarUserName').textContent = Auth.getUser()?.name || 'Admin';
  loadCategories();
});

async function loadCategories() {
  try {
    const res = await api.categories.list();
    if (res.success) {
      allCats = [];
      function flatten(items, level = 0) {
        items.forEach(c => { allCats.push({ ...c, level }); if (c.children) flatten(c.children, level + 1); });
      }
      flatten(res.data || []);
      renderTable();
      renderParentOptions();
    }
  } catch { document.getElementById('catsTable').innerHTML = `<tr><td colspan="6" style="text-align:center;color:#DC2626;padding:1rem">Lỗi tải dữ liệu</td></tr>`; }
}

function renderTable() {
  document.getElementById('catsTable').innerHTML = allCats.map(c => `
    <tr>
      <td><span style="padding-left:${c.level * 20}px">${c.level > 0 ? '└ ' : ''}${c.name}</span></td>
      <td style="font-size:0.78rem;color:var(--color-text-muted)">${c.slug}</td>
      <td style="font-size:0.82rem">${c.parentName || '—'}</td>
      <td>${c.productCount || 0}</td>
      <td>${getStatusBadge(c.status || 'ACTIVE')}</td>
      <td><div class="actions">
        <button class="btn btn-xs btn-outline" onclick="editCat(${c.id})">Sửa</button>
        <button class="btn btn-xs btn-outline" onclick="toggleCat(${c.id})">${c.status === 'INACTIVE' ? 'Bật' : 'Ẩn'}</button>
        <button class="btn btn-xs btn-danger" onclick="deleteCat(${c.id}, '${c.name.replace(/'/g, "\\'")}', ${c.productCount || 0})">Xóa</button>
      </div></td>
    </tr>
  `).join('') || `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Chưa có danh mục nào</td></tr>`;
}

function renderParentOptions() {
  const sel = document.getElementById('catParent');
  const current = sel.value;
  sel.innerHTML = '<option value="">Không có (danh mục gốc)</option>' + allCats.filter(c => c.level === 0).map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  sel.value = current;
}

function openCatModal(id = null) {
  document.getElementById('catModalTitle').textContent = id ? 'Chỉnh sửa danh mục' : 'Thêm danh mục';
  document.getElementById('catForm').reset(); document.getElementById('catId').value = id || '';
  document.getElementById('catModalAlert').innerHTML = ''; renderParentOptions();
  document.getElementById('catModal').classList.add('open');
}

async function editCat(id) {
  openCatModal(id);
  try {
    const res = await api.categories.get(id);
    if (res.success && res.data) {
      const c = res.data;
      document.getElementById('catName').value = c.name;
      document.getElementById('catSlug').value = c.slug || '';
      document.getElementById('catDesc').value = c.description || '';
      if (c.parentId) document.getElementById('catParent').value = c.parentId;
    }
  } catch {}
}

function closeModal() { document.getElementById('catModal').classList.remove('open'); }

async function saveCat() {
  const id = document.getElementById('catId').value;
  const alertBox = document.getElementById('catModalAlert');
  alertBox.innerHTML = '';
  const name = document.getElementById('catName').value.trim();
  if (!name) { alertBox.innerHTML = `<div class="alert alert-error">Tên danh mục là bắt buộc</div>`; return; }
  const data = {
    name, slug: document.getElementById('catSlug').value.trim() || null,
    description: document.getElementById('catDesc').value.trim() || null,
    parentId: document.getElementById('catParent').value ? parseInt(document.getElementById('catParent').value) : null,
  };
  const btn = document.getElementById('saveCatBtn'); setLoading(btn, true);
  try {
    const res = id ? await api.categories.update(id, data) : await api.categories.create(data);
    if (res.success) { closeModal(); showToast(id ? 'Đã cập nhật danh mục' : 'Đã thêm danh mục mới'); loadCategories(); }
  } catch (err) { alertBox.innerHTML = `<div class="alert alert-error">${err.message || 'Có lỗi xảy ra'}</div>`; setLoading(btn, false); }
}

async function toggleCat(id) {
  try { await api.categories.toggleStatus(id); showToast('Đã cập nhật trạng thái'); loadCategories(); }
  catch { showToast('Không thể cập nhật', 'error'); }
}

async function deleteCat(id, name, productCount) {
  if (productCount > 0) {
    showToast(`Không thể xóa danh mục "${name}" vì còn ${productCount} sản phẩm`, 'error');
    return;
  }
  if (!confirm(`Xóa danh mục "${name}"? Hành động này không thể hoàn tác.`)) return;
  try {
    await api.categories.delete(id);
    showToast('Đã xóa danh mục');
    loadCategories();
  } catch (err) { showToast(err.message || 'Không thể xóa danh mục', 'error'); }
}
</script>
</body>
</html>
