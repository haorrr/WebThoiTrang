<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả thanh toán — MAISON</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="navbar__logo">MAISON<span>.</span></a>
  <div class="navbar__links" id="navLinks">
    <a href="products.html">Bộ sưu tập</a>
    <a href="index.html#story">Về chúng tôi</a>
    <a href="index.html#testimonials">Đánh giá</a>
    <a href="index.html#newsletter">Liên hệ</a>
  </div>
  <div class="navbar__actions" id="navActions"></div>
</nav>

<div class="container" style="padding-top:120px;padding-bottom:4rem;min-height:70vh;display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;max-width:480px;width:100%;padding:2rem">
    <div id="resultContent">
      <div class="skeleton" style="height:80px;width:80px;border-radius:50%;margin:0 auto 1rem"></div>
      <div class="skeleton" style="height:36px;border-radius:8px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:20px;width:70%;margin:0 auto 2rem;border-radius:8px"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom">
      <p>&copy; 2026 MAISON. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="js/api.js"></script>
<script>
const params   = new URLSearchParams(window.location.search);
const status   = params.get('status');
const orderId  = params.get('orderId');

document.addEventListener('DOMContentLoaded', () => {
  renderNavActions();
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });

  const el = document.getElementById('resultContent');

  if (status === 'success') {
    el.innerHTML = `
      <div style="width:80px;height:80px;border-radius:50%;background:#DCFCE7;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:0.5rem;font-family:var(--font-heading)">Thanh toán thành công!</h1>
      <p style="color:var(--color-text-muted);margin-bottom:2rem;line-height:1.6">Đơn hàng của bạn đã được xác nhận và đang được xử lý.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="order-detail.html?id=${orderId}" class="btn btn-dark">Xem đơn hàng</a>
        <a href="products.html" class="btn btn-outline">Tiếp tục mua sắm</a>
      </div>`;
  } else {
    el.innerHTML = `
      <div style="width:80px;height:80px;border-radius:50%;background:#FEE2E2;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
      <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:0.5rem;font-family:var(--font-heading)">Thanh toán thất bại</h1>
      <p style="color:var(--color-text-muted);margin-bottom:2rem;line-height:1.6">Giao dịch không thành công hoặc đã bị hủy. Đơn hàng đã được hủy tự động.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="products.html" class="btn btn-dark">Tiếp tục mua sắm</a>
        <a href="orders.html" class="btn btn-outline">Đơn hàng của tôi</a>
      </div>`;
  }
});
</script>
</body>
</html>
