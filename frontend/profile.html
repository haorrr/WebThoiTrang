<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tài khoản — MAISON</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="navbar__logo">MAISON<span>.</span></a>
  <div class="navbar__links" id="navLinks">
    <a href="products.html">Bộ sưu tập</a>
    <a href="orders.html">Đơn hàng</a>
  </div>
  <div class="navbar__actions" id="navActions"></div>
  <button class="navbar__hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="page-header">
  <div class="container">
    <span class="section-label">Cá nhân</span>
    <h1>Tài khoản của tôi</h1>
  </div>
</div>

<div class="container page-content">
  <div class="user-page-layout">
    <!-- Sidebar -->
    <div class="user-sidebar">
      <div class="user-sidebar__card">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-name" id="userName">Đang tải...</div>
        <div class="user-email" id="userEmail"></div>
      </div>
      <nav class="user-menu">
        <a href="profile.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Thông tin cá nhân
        </a>
        <a href="orders.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Đơn hàng của tôi
        </a>
        <a href="#loyalty">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Điểm thưởng
        </a>
        <a href="#" onclick="handleLogout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Đăng xuất
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div>
      <div class="content-card">
        <h2 class="content-card__title">Thông tin cá nhân</h2>
        <div id="alertBox"></div>
        <form id="profileForm">
          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input class="form-input" type="text" id="name" placeholder="Họ và tên" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="email" disabled style="opacity:0.6;cursor:not-allowed">
            <p class="form-hint">Email không thể thay đổi</p>
          </div>
          <div style="display:flex;gap:1rem;margin-top:0.5rem">
            <button type="submit" class="btn btn-primary" id="saveBtn">Lưu thay đổi</button>
            <button type="button" class="btn btn-outline" onclick="loadProfile()">Hủy</button>
          </div>
        </form>
      </div>

      <!-- Account Info -->
      <div class="content-card">
        <h2 class="content-card__title">Thông tin tài khoản</h2>
        <div id="accountInfo"></div>
      </div>

      <!-- Loyalty Points -->
      <div class="content-card" id="loyalty">
        <h2 class="content-card__title">Điểm thưởng</h2>
        <div id="loyaltyContent">
          <div class="skeleton" style="height:120px;border-radius:12px;margin-bottom:1rem"></div>
          <div class="skeleton" style="height:60px;border-radius:12px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom"><p>&copy; 2026 MAISON. All rights reserved.</p></div>
  </div>
</footer>

<script src="js/api.js?v=3"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
  renderNavActions();
  loadProfile();
  loadLoyalty();
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
});

async function loadProfile() {
  try {
    const res = await api.users.me();
    if (res.success && res.data) {
      const u = res.data;
      Auth.save(null, null, u);
      // Update sidebar
      const initials = u.name ? u.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : 'U';
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = u.name || '';
      document.getElementById('userEmail').textContent = u.email || '';
      // Form
      document.getElementById('name').value = u.name || '';
      document.getElementById('email').value = u.email || '';
      // Account info
      document.getElementById('accountInfo').innerHTML = `
        <div class="summary-row" style="padding:8px 0;border-bottom:1px solid var(--color-border)"><span style="color:var(--color-text-muted)">Vai trò</span><span>${u.role === 'ROLE_ADMIN' ? '<span class="badge badge-warning">Admin</span>' : '<span class="badge badge-success">Thành viên</span>'}</span></div>
        <div class="summary-row" style="padding:8px 0;border-bottom:1px solid var(--color-border)"><span style="color:var(--color-text-muted)">Trạng thái</span><span>${getStatusBadge(u.status)}</span></div>
        <div class="summary-row" style="padding:8px 0;border-bottom:1px solid var(--color-border)"><span style="color:var(--color-text-muted)">Đăng nhập qua</span><span>${u.provider}</span></div>
        <div class="summary-row" style="padding:8px 0"><span style="color:var(--color-text-muted)">Ngày tạo</span><span>${formatDate(u.createdAt)}</span></div>
      `;
    }
  } catch {}
}

async function loadLoyalty() {
  const container = document.getElementById('loyaltyContent');
  try {
    const [sumRes, refRes] = await Promise.all([
      api.loyalty.getSummary(),
      api.loyalty.getReferralCode()
    ]);
    const s = sumRes.success ? sumRes.data : { totalPoints: 0, totalEarned: 0, totalRedeemed: 0, history: [] };
    const refCode = refRes.success ? (refRes.data?.referralCode || refRes.data || '') : '';
    const typeColor = { EARNED: '#16A34A', REDEEMED: '#DC2626', REFERRAL_BONUS: '#7C3AED', EXPIRED: '#F97316' };
    const typeLabel = { EARNED: 'Tích lũy', REDEEMED: 'Đổi điểm', REFERRAL_BONUS: 'Giới thiệu', EXPIRED: 'Hết hạn' };
    const history = s.history || [];
    container.innerHTML = `
      <div style="text-align:center;padding:1.5rem;background:linear-gradient(135deg,#CA8A04,#92400E);border-radius:12px;color:#fff;margin-bottom:1.5rem">
        <div style="font-size:3rem;font-weight:700;line-height:1">${s.totalPoints.toLocaleString('vi-VN')}</div>
        <div style="font-size:0.9rem;opacity:0.85;margin-top:4px">điểm tích lũy</div>
        <div style="font-size:1.1rem;font-weight:600;margin-top:8px">${formatVND(s.cashValue || s.totalPoints * 1000)}</div>
        <div style="display:flex;justify-content:center;gap:2rem;margin-top:1rem;font-size:0.82rem;opacity:0.9">
          <div><div style="font-weight:600">${(s.totalEarned||0).toLocaleString('vi-VN')}</div><div>Đã tích lũy</div></div>
          <div><div style="font-weight:600">${(s.totalRedeemed||0).toLocaleString('vi-VN')}</div><div>Đã đổi</div></div>
        </div>
      </div>
      ${refCode ? `
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:10px;margin-bottom:1.5rem">
        <span style="font-size:0.85rem;color:var(--color-text-muted);flex-shrink:0">Mã giới thiệu:</span>
        <code id="refCodeText" style="flex:1;font-size:1rem;font-weight:700;letter-spacing:0.05em;color:var(--color-text)">${refCode}</code>
        <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${refCode}').then(()=>showToast('Đã sao chép mã giới thiệu!'))">Sao chép</button>
      </div>` : ''}
      ${history.length > 0 ? `
      <h3 style="font-size:0.95rem;font-weight:600;margin-bottom:0.75rem">Lịch sử giao dịch</h3>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
          <thead>
            <tr style="border-bottom:2px solid var(--color-border)">
              <th style="text-align:left;padding:8px 10px;color:var(--color-text-muted);font-weight:500">Loại</th>
              <th style="text-align:right;padding:8px 10px;color:var(--color-text-muted);font-weight:500">Điểm</th>
              <th style="text-align:left;padding:8px 10px;color:var(--color-text-muted);font-weight:500">Mô tả</th>
              <th style="text-align:left;padding:8px 10px;color:var(--color-text-muted);font-weight:500">Thời gian</th>
            </tr>
          </thead>
          <tbody>
            ${history.map(h => `
            <tr style="border-bottom:1px solid var(--color-border)">
              <td style="padding:8px 10px"><span style="color:${typeColor[h.type]||'var(--color-text)'};font-weight:600">${typeLabel[h.type]||h.type}</span></td>
              <td style="padding:8px 10px;text-align:right;font-weight:600;color:${h.points>0?'#16A34A':'#DC2626'}">${h.points>0?'+':''}${h.points}</td>
              <td style="padding:8px 10px;color:var(--color-text-muted)">${h.description||''}</td>
              <td style="padding:8px 10px;color:var(--color-text-muted)">${formatDate(h.createdAt)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p style="color:var(--color-text-muted);font-size:0.9rem">Chưa có giao dịch điểm thưởng nào.</p>'}
    `;
  } catch (e) {
    container.innerHTML = '<p style="color:var(--color-text-muted)">Không thể tải thông tin điểm thưởng.</p>';
  }
}

document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  const alertBox = document.getElementById('alertBox');
  alertBox.innerHTML = '';
  setLoading(btn, true);
  try {
    const res = await api.users.updateMe({ name: document.getElementById('name').value.trim() });
    if (res.success) {
      alertBox.innerHTML = `<div class="alert alert-success">Cập nhật thành công!</div>`;
      Auth.save(null, null, res.data);
      loadProfile();
    }
  } catch (err) {
    alertBox.innerHTML = `<div class="alert alert-error">${err.message || 'Cập nhật thất bại'}</div>`;
  }
  setLoading(btn, false);
});
</script>
</body>
</html>
